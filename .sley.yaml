# sley configuration file
# Documentation: https://github.com/indaco/sley

# Enabled plugins:
#   - commit-parser
#   - tag-manager
#   - changelog-parser

path: .version
plugins:
  # Analyzes conventional commits to suggest version bumps
  commit-parser: true
  # Automatically creates git tags after version changes
  tag-manager:
    enabled: true
  # Infers version bump from CHANGELOG.md entries
  changelog-parser:
    enabled: true
