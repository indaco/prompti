name: Release
on:
  release:
    types: [created]

permissions: {}

env:
  GO_VERSION: '1.25'

jobs:
  create-release-notes:
    name: release-notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update Release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.PROMPTI_TOKEN }}
        run: |
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --draft=false \
            --prerelease=false \
            --latest \
            --notes-file "${{ github.workspace }}/.changes/${RELEASE_TAG}.md"
